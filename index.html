<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приветствие пользователя</title>
  <style>
    :root {
      --bg-1: #0d1020;
      --bg-2: #151a33;
      --accent-1: #7f5cff;
      --accent-2: #2dd4bf;
      --text-main: #f3f5ff;
      --text-muted: #b6bdd8;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(127, 92, 255, 0.35), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(45, 212, 191, 0.22), transparent 40%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .card {
      width: min(460px, 100%);
      padding: 32px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--text-muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #e8ebff;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(7, 10, 24, 0.75);
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #8f97b8;
    }

    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1020;
      background: linear-gradient(120deg, var(--accent-2), #6ef3e0);
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 24px rgba(45, 212, 191, 0.35);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-top: 18px;
      min-height: 1.6em;
      color: #d7fef8;
      font-size: 1.02rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Добро пожаловать</h1>
    <p class="subtitle">Заполните форму, и страница поприветствует вас персонально.</p>

    <form id="userForm">
      <label>
        Ваше имя
        <input id="name" type="text" placeholder="Например, Павел" required>
      </label>

      <label>
        Ваш возраст
        <input id="age" type="number" min="1" max="130" placeholder="Например, 25" required>
      </label>

      <button type="submit">Отправить</button>
    </form>

    <p class="result" id="result"></p>
  </main>

  <script>
    const form = document.getElementById("userForm");
    const nameInput = document.getElementById("name");
    const ageInput = document.getElementById("age");
    const result = document.getElementById("result");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const name = nameInput.value.trim();
      const age = ageInput.value.trim();

      result.textContent = "Привет, " + name + "! Тебе " + age + " лет. Рады видеть тебя!";
    });
  </script>
</body>
</html>
